name: Multi-Platform Static Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    # --- Linux Dependencies ---
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y cmake g++ wget libzstd-dev libbz2-dev zlib1g-dev pkg-config libicu-dev
        # Build static Boost 1.89
        cd /tmp
        wget https://github.com/boostorg/boost/releases/download/boost-1.89.0/boost-1.89.0-cmake.tar.gz
        tar xzf boost-1.89.0-cmake.tar.gz
        cd boost-1.89.0
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=OFF
        sudo cmake --build . --target install -j$(nproc)

    # --- macOS Dependencies ---
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install boost@1.89 cmake libomp

    # --- Windows Dependencies ---
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install cmake -y
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg install boost-filesystem:x64-windows-static boost-iostreams:x64-windows-static boost-program-options:x64-windows-static boost-regex:x64-windows-static
        echo "VCPKG_ROOT=${{ github.workspace }}\\vcpkg" >> $env:GITHUB_ENV
        echo "CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\\vcpkg\\scripts\\buildsystems\\vcpkg.cmake" >> $env:GITHUB_ENV
        echo "BOOST_ROOT=${{ github.workspace }}\\vcpkg\\installed\\x64-windows-static" >> $env:GITHUB_ENV
        echo "BOOST_INCLUDEDIR=${{ github.workspace }}\\vcpkg\\installed\\x64-windows-static\\include" >> $env:GITHUB_ENV

    # --- Build (Linux) ---
    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir build
        cd build
        export CXXFLAGS="-Wall -Wextra -Wno-unused-parameter"
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DBoost_USE_STATIC_LIBS=ON -DBUILD_SHARED_LIBS=OFF
        cmake --build . --parallel 2>&1 | tee build_log.txt

    # --- Build (macOS) ---
    - name: Build (macOS)
      if: runner.os == 'macOS'
      run: |
        export LDFLAGS="-L/opt/homebrew/opt/libomp/lib"
        export CPPFLAGS="-I/opt/homebrew/opt/libomp/include"
        export PATH="/opt/homebrew/opt/libomp/bin:$PATH"
        mkdir build
        cd build
        export CXXFLAGS="-Wall -Wextra -Wno-unused-parameter"
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBoost_USE_STATIC_LIBS=ON \
          -DBUILD_SHARED_LIBS=OFF \
          -DCMAKE_C_FLAGS="-Xpreprocessor -fopenmp -I/opt/homebrew/opt/libomp/include" \
          -DCMAKE_CXX_FLAGS="-Xpreprocessor -fopenmp -I/opt/homebrew/opt/libomp/include" \
          -DCMAKE_EXE_LINKER_FLAGS="-L/opt/homebrew/opt/libomp/lib -lomp"
        cmake --build . --parallel 2>&1 | tee build_log.txt

    # --- Build (Windows) ---
    - name: Build (Windows)
      if: runner.os == 'Windows'
      env:
        BOOST_ROOT: ${{ env.BOOST_ROOT }}
        BOOST_INCLUDEDIR: ${{ env.BOOST_INCLUDEDIR }}
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DBoost_USE_STATIC_LIBS=ON -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}" -DVCPKG_LIBRARY_LINKAGE=static -DBUILD_SHARED_LIBS=OFF -DBOOST_ROOT="${{ env.BOOST_ROOT }}" -DBOOST_INCLUDEDIR="${{ env.BOOST_INCLUDEDIR }}"
        cmake --build . --config Debug --parallel > build_log.txt

    # --- Stage Binaries (Linux/macOS) ---
    - name: Stage Binaries (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        mkdir dist
        cp build/progressiveMauve dist/ || true
        cp build/build_log.txt dist/ || true

    # --- Stage Binaries (Windows) ---
    - name: Stage Binaries (Windows)
      if: runner.os == 'Windows'
      run: |
        mkdir dist
        if exist build\Debug\progressiveMauve.exe copy build\Debug\progressiveMauve.exe dist\
        if exist build\build_log.txt copy build\build_log.txt dist\

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-static-artifacts
        path: dist/*
