name: Build ProgressiveMauve Multi-Platform

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  BOOST_VERSION: 1.89.0
  BOOST_URL: https://archives.boost.io/release/1.89.0/source/boost_1_89_0.tar.gz
  BOOST_DIR: boost_1_89_0

jobs:
  # ==============================================================================
  # 1. LINUX BUILD
  # ==============================================================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libbz2-dev liblzma-dev libicu-dev zlib1g-dev

      - name: Cache Boost
        id: cache-boost-linux
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost-install
          key: ${{ runner.os }}-boost-${{ env.BOOST_VERSION }}

      - name: Build Boost ${{ env.BOOST_VERSION }} from Source
        if: steps.cache-boost-linux.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.BOOST_URL }}
          tar xzf ${{ env.BOOST_DIR }}.tar.gz
          cd ${{ env.BOOST_DIR }}
          ./bootstrap.sh --prefix=${{ github.workspace }}/boost-install --with-libraries=filesystem,iostreams,program_options,regex,system
          # ADDED --prefix here to strictly enforce install location
          ./b2 install --prefix=${{ github.workspace }}/boost-install link=static threading=multi variant=release -j$(nproc)

      - name: Configure CMake
        env:
          CXXFLAGS: "-O3 -fno-fast-math -DCOMMAND_LINE -fno-strict-aliasing"
        run: |
          mkdir -p build
          mkdir -p build_logs
          # FIX: Use CMAKE_PREFIX_PATH instead of BOOST_ROOT
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/boost-install \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DENABLE_ZLIB=OFF \
            -DENABLE_SANITIZERS=OFF 2>&1 | tee build_logs/configure.log

      - name: Build
        # Uses --build which works for both Makefiles and Ninja
        run: |
          cmake --build build --config Release -j$(nproc) 2>&1 | tee -a build_logs/build.log

      - name: Generate addr2line map
        run: |
          nm -an build/progressiveMauve | grep " [tTwW] " | awk '{print $1}' \
          | xargs -I{} addr2line -Cf -e build/progressiveMauve {} \
          > build_logs/addr2line_map.txt 2>/dev/null || true

      - name: Upload Artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: progressiveMauve-Linux
          path: |
            build/progressiveMauve
            build_logs/

  # ==============================================================================
  # 2. MACOS BUILD (Apple Silicon / ARM64)
  # ==============================================================================
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install cmake icu4c libomp
          brew link --force libomp

      - name: Cache Boost
        id: cache-boost-mac
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost-install
          key: ${{ runner.os }}-boost-${{ env.BOOST_VERSION }}-arm64

      - name: Build Boost ${{ env.BOOST_VERSION }} from Source
        if: steps.cache-boost-mac.outputs.cache-hit != 'true'
        run: |
          curl -L -o boost.tar.gz ${{ env.BOOST_URL }}
          tar xzf boost.tar.gz
          cd ${{ env.BOOST_DIR }}
          ./bootstrap.sh --prefix=${{ github.workspace }}/boost-install --with-libraries=filesystem,iostreams,program_options,regex,system
          ./b2 install --prefix=${{ github.workspace }}/boost-install link=static threading=multi variant=release address-model=64 architecture=arm -j$(sysctl -n hw.ncpu)

      - name: Configure CMake
        env:
          ICU_ROOT: /opt/homebrew/opt/icu4c
          CXXFLAGS: "-O3 -fno-fast-math -DCOMMAND_LINE -fno-strict-aliasing"
        run: |
          mkdir -p build
          mkdir -p build_logs
          # FIX: Use CMAKE_PREFIX_PATH instead of BOOST_ROOT
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/boost-install;/opt/homebrew/opt/icu4c" \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DENABLE_ZLIB=OFF 2>&1 | tee build_logs/configure.log

      - name: Build
        run: |
          cmake --build build --config Release -j$(sysctl -n hw.ncpu) 2>&1 | tee -a build_logs/build.log

      - name: Upload Artifacts (MacOS)
        uses: actions/upload-artifact@v4
        with:
          name: progressiveMauve-MacOS-ARM64
          path: |
            build/progressiveMauve
            build_logs/

  # ==============================================================================
  # 3. WINDOWS BUILD (MSVC)
  # ==============================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ICU via vcpkg
        run: vcpkg install icu:x64-windows-static
        shell: bash

      - name: Cache Boost
        id: cache-boost-win
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost-install
          key: ${{ runner.os }}-boost-${{ env.BOOST_VERSION }}-msvc

      - name: Build Boost ${{ env.BOOST_VERSION }} from Source
        if: steps.cache-boost-win.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          curl -L -o boost.tar.gz ${{ env.BOOST_URL }}
          tar xzf boost.tar.gz
          cd ${{ env.BOOST_DIR }}
          call bootstrap.bat
          b2 install --prefix=${{ github.workspace }}/boost-install --with-filesystem --with-iostreams --with-program_options --with-regex --with-system toolset=msvc address-model=64 link=static threading=multi runtime-link=static variant=release

      - name: Configure CMake
        shell: bash
        run: |
          mkdir -p build
          mkdir -p build_logs
          # FIX: Use CMAKE_PREFIX_PATH instead of BOOST_ROOT
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows-static \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/boost-install" \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DENABLE_ZLIB=OFF \
            -DCMAKE_BUILD_TYPE=Release > build_logs/configure.log 2>&1

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release --verbose >> build_logs/build.log 2>&1

      - name: Upload Artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: progressiveMauve-Windows
          path: |
            build/Release/progressiveMauve.exe
            build_logs/