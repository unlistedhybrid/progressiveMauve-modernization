name: Build ProgressiveMauve Multi-Platform

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  BOOST_VERSION: 1.89.0
  BOOST_URL: https://archives.boost.io/release/1.89.0/source/boost_1_89_0.tar.gz
  BOOST_DIR: boost_1_89_0

jobs:
  # ==============================================================================
  # 1. LINUX BUILD (AMD64)
  # ==============================================================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libbz2-dev liblzma-dev libicu-dev zlib1g-dev

      - name: Cache Boost
        id: cache-boost-linux
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost-install
          key: ${{ runner.os }}-boost-${{ env.BOOST_VERSION }}-v15

      - name: Build Boost ${{ env.BOOST_VERSION }}
        if: steps.cache-boost-linux.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.BOOST_URL }}
          tar xzf ${{ env.BOOST_DIR }}.tar.gz
          cd ${{ env.BOOST_DIR }}
          ./bootstrap.sh --prefix=${{ github.workspace }}/boost-install --with-libraries=filesystem,iostreams,program_options,regex
          ./b2 install --prefix=${{ github.workspace }}/boost-install link=static threading=multi variant=release -j$(nproc)

      - name: Configure CMake
        run: |
          mkdir -p build build_logs
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/boost-install" \
            -DENABLE_OPENMP=ON \
            -DENABLE_ZLIB=OFF \
            -DENABLE_SANITIZERS=OFF 2>&1 | tee build_logs/configure.log

      - name: Build
        run: |
          cmake --build build --config Release -j$(nproc) 2>&1 | tee -a build_logs/build.log

      - name: Run Test Alignment
        run: |
          chmod +x build/progressiveMauve
          echo "Running alignment..."
          ./build/progressiveMauve --output=linux_amd64.xmfa test_data/jp.fasta test_data/CP08.fasta
          
          # Skip the first 6 lines (header with filename) and hash the rest
          tail -n +7 linux_amd64.xmfa | sha256sum > checksum.txt
          echo "SHA256 Hash (Content Only):"
          cat checksum.txt

      - name: Upload Artifacts (Linux-AMD64)
        uses: actions/upload-artifact@v4
        with:
          name: progressiveMauve-Linux-AMD64
          path: |
            build/progressiveMauve
            build_logs/
            linux_amd64.xmfa
            checksum.txt

  # ==============================================================================
  # 2. LINUX BUILD (ARM64 - NATIVE)
  # ==============================================================================
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libbz2-dev liblzma-dev libicu-dev zlib1g-dev

      - name: Cache Boost
        id: cache-boost-linux-arm
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost-install
          key: ${{ runner.os }}-arm64-boost-${{ env.BOOST_VERSION }}-v15

      - name: Build Boost ${{ env.BOOST_VERSION }}
        if: steps.cache-boost-linux-arm.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.BOOST_URL }}
          tar xzf ${{ env.BOOST_DIR }}.tar.gz
          cd ${{ env.BOOST_DIR }}
          ./bootstrap.sh --prefix=${{ github.workspace }}/boost-install --with-libraries=filesystem,iostreams,program_options,regex
          ./b2 install --prefix=${{ github.workspace }}/boost-install link=static threading=multi variant=release -j$(nproc)

      - name: Configure CMake
        run: |
          mkdir -p build build_logs
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/boost-install" \
            -DENABLE_OPENMP=ON \
            -DENABLE_ZLIB=OFF \
            -DENABLE_SANITIZERS=OFF 2>&1 | tee build_logs/configure.log

      - name: Build
        run: |
          cmake --build build --config Release -j$(nproc) 2>&1 | tee -a build_logs/build.log

      - name: Run Test Alignment
        run: |
          chmod +x build/progressiveMauve
          echo "Running alignment..."
          ./build/progressiveMauve --output=linux_arm64.xmfa test_data/jp.fasta test_data/CP08.fasta
          
          # Skip header
          tail -n +7 linux_arm64.xmfa | sha256sum > checksum.txt
          echo "SHA256 Hash (Content Only):"
          cat checksum.txt

      - name: Upload Artifacts (Linux-ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: progressiveMauve-Linux-ARM64
          path: |
            build/progressiveMauve
            build_logs/
            linux_arm64.xmfa
            checksum.txt

  # ==============================================================================
  # 3. MACOS BUILD (ARM64 / Apple Silicon)
  # ==============================================================================
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install cmake icu4c libomp
          brew link --force libomp

      - name: Cache Boost
        id: cache-boost-mac-arm
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost-install
          key: ${{ runner.os }}-boost-${{ env.BOOST_VERSION }}-arm64-v15

      - name: Build Boost ${{ env.BOOST_VERSION }}
        if: steps.cache-boost-mac-arm.outputs.cache-hit != 'true'
        run: |
          curl -L -o boost.tar.gz ${{ env.BOOST_URL }}
          tar xzf boost.tar.gz
          cd ${{ env.BOOST_DIR }}
          ./bootstrap.sh --prefix=${{ github.workspace }}/boost-install --with-libraries=filesystem,iostreams,program_options,regex
          ./b2 install --prefix=${{ github.workspace }}/boost-install link=static threading=multi variant=release address-model=64 architecture=arm -j$(sysctl -n hw.ncpu)

      - name: Configure CMake
        env:
          CXXFLAGS: "-I/opt/homebrew/opt/libomp/include -ffp-contract=off"
          LDFLAGS: "-L/opt/homebrew/opt/libomp/lib"
        run: |
          mkdir -p build build_logs
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/boost-install;/opt/homebrew/opt/icu4c" \
            -DENABLE_OPENMP=ON \
            -DENABLE_ZLIB=OFF 2>&1 | tee build_logs/configure.log

      - name: Build
        run: |
          cmake --build build --config Release -j$(sysctl -n hw.ncpu) 2>&1 | tee -a build_logs/build.log

      - name: Run Test Alignment
        run: |
          chmod +x build/progressiveMauve
          echo "Running alignment..."
          ./build/progressiveMauve --output=macos_arm64.xmfa test_data/jp.fasta test_data/CP08.fasta
          
          # Skip header + shasum
          tail -n +7 macos_arm64.xmfa | shasum -a 256 > checksum.txt
          echo "SHA256 Hash (Content Only):"
          cat checksum.txt

      - name: Upload Artifacts (MacOS-ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: progressiveMauve-MacOS-ARM64
          path: |
            build/progressiveMauve
            build_logs/
            macos_arm64.xmfa
            checksum.txt

  # ==============================================================================
  # 4. MACOS BUILD (AMD64 / Intel)
  # ==============================================================================
  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install cmake icu4c libomp
          brew link --force libomp

      - name: Cache Boost
        id: cache-boost-mac-intel
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost-install
          key: ${{ runner.os }}-boost-${{ env.BOOST_VERSION }}-intel-v16

      - name: Build Boost ${{ env.BOOST_VERSION }}
        if: steps.cache-boost-mac-intel.outputs.cache-hit != 'true'
        run: |
          curl -L -o boost.tar.gz ${{ env.BOOST_URL }}
          tar xzf boost.tar.gz
          cd ${{ env.BOOST_DIR }}
          ./bootstrap.sh --prefix=${{ github.workspace }}/boost-install --with-libraries=filesystem,iostreams,program_options,regex
          ./b2 install --prefix=${{ github.workspace }}/boost-install link=static threading=multi variant=release address-model=64 architecture=x86 -j$(sysctl -n hw.ncpu)

      - name: Configure CMake
        env:
          CXXFLAGS: "-I/usr/local/opt/libomp/include -ffp-contract=off"
          LDFLAGS: "-L/usr/local/opt/libomp/lib"
        run: |
          mkdir -p build build_logs
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/boost-install;/usr/local/opt/icu4c" \
            -DENABLE_OPENMP=ON \
            -DENABLE_ZLIB=OFF 2>&1 | tee build_logs/configure.log

      - name: Build
        run: |
          cmake --build build --config Release -j$(sysctl -n hw.ncpu) 2>&1 | tee -a build_logs/build.log

      - name: Run Test Alignment
        run: |
          chmod +x build/progressiveMauve
          echo "Running alignment..."
          ./build/progressiveMauve --output=macos_intel.xmfa test_data/jp.fasta test_data/CP08.fasta
          
          tail -n +7 macos_intel.xmfa | shasum -a 256 > checksum.txt
          echo "SHA256 Hash (Content Only):"
          cat checksum.txt

      - name: Upload Artifacts (MacOS-Intel)
        uses: actions/upload-artifact@v4
        with:
          name: progressiveMauve-MacOS-Intel
          path: |
            build/progressiveMauve
            build_logs/
            macos_intel.xmfa
            checksum.txt

  # ==============================================================================
  # 5. WINDOWS BUILD (MSVC)
  # ==============================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache VCPKG (ICU)
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-icu-x64-static-v1

      - name: Install ICU via vcpkg
        shell: bash
        run: vcpkg install icu:x64-windows-static

      - name: Cache Boost
        id: cache-boost-win
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/boost-install
          key: ${{ runner.os }}-boost-${{ env.BOOST_VERSION }}-msvc-v16

      - name: Build Boost ${{ env.BOOST_VERSION }}
        if: steps.cache-boost-win.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          curl -L -o boost.tar.gz ${{ env.BOOST_URL }}
          tar xzf boost.tar.gz
          cd ${{ env.BOOST_DIR }}
          call bootstrap.bat
          b2 install --prefix=%GITHUB_WORKSPACE%\boost-install --with-filesystem --with-iostreams --with-program_options --with-regex toolset=msvc address-model=64 link=static threading=multi runtime-link=static variant=release

      - name: Configure CMake
        shell: bash
        run: |
          rm -rf build build_logs
          mkdir -p build build_logs
          if ! cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows-static \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/boost-install" \
            -DBoost_USE_STATIC_RUNTIME=ON \
            -DENABLE_OPENMP=ON \
            -DENABLE_ZLIB=OFF \
            -DCMAKE_BUILD_TYPE=Release > build_logs/configure.log 2>&1; then
              cat build_logs/configure.log
              exit 1
          fi

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release --verbose 2>&1 | tee build_logs/build.log

      - name: Run Test Alignment
        shell: bash
        run: |
          echo "Running alignment..."
          ./build/Release/progressiveMauve.exe --output=windows_amd64.xmfa test_data/jp.fasta test_data/CP08.fasta
          
          # Bash shell allows using tail even on Windows runner
          tail -n +7 windows_amd64.xmfa | sha256sum > checksum.txt
          echo "SHA256 Hash (Content Only):"
          cat checksum.txt

      - name: Upload Artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: progressiveMauve-Windows
          path: |
            build/Release/progressiveMauve.exe
            build_logs/
            windows_amd64.xmfa
            checksum.txt

  # ==============================================================================
  # 6. COMPARE HASHES
  # ==============================================================================
  compare-hashes:
    needs: [build-linux, build-linux-arm64, build-macos-arm64, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compare Checksums
        run: |
          echo "Gathering Checksums (Skipped Header)..."
          
          LINUX_AMD64=$(awk '{print $1}' artifacts/progressiveMauve-Linux-AMD64/checksum.txt)
          LINUX_ARM64=$(awk '{print $1}' artifacts/progressiveMauve-Linux-ARM64/checksum.txt)
          MAC_ARM64=$(awk '{print $1}' artifacts/progressiveMauve-MacOS-ARM64/checksum.txt)
          MAC_INTEL=$(awk '{print $1}' artifacts/progressiveMauve-MacOS-Intel/checksum.txt)
          WIN_AMD64=$(awk '{print $1}' artifacts/progressiveMauve-Windows/checksum.txt)

          echo "----------------------------------------"
          echo "COMPARING CONTENT HASHES"
          echo "----------------------------------------"
          echo "Linux AMD64: $LINUX_AMD64"
          echo "Linux ARM64: $LINUX_ARM64"
          echo "MacOS ARM64: $MAC_ARM64"
          echo "MacOS Intel: $MAC_INTEL"
          echo "Windows X64: $WIN_AMD64"
          echo "----------------------------------------"

          FAIL=0
          
          if [ "$LINUX_ARM64" != "$LINUX_AMD64" ]; then echo "❌ Linux ARM64 mismatch!"; FAIL=1; fi
          if [ "$MAC_ARM64" != "$LINUX_AMD64" ]; then echo "❌ MacOS ARM64 mismatch!"; FAIL=1; fi
          if [ "$MAC_INTEL" != "$LINUX_AMD64" ]; then echo "❌ MacOS Intel mismatch!"; FAIL=1; fi
          if [ "$WIN_AMD64" != "$LINUX_AMD64" ]; then echo "❌ Windows mismatch!"; FAIL=1; fi

          if [ $FAIL -eq 0 ]; then
            echo "✅ ALL PLATFORMS MATCH EXACTLY!"
          else
            echo "⚠️  HASH MISMATCH DETECTED"
          fi