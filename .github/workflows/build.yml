name: Debug Linux Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ----------------------------
    # LINUX DEPENDENCIES
    # ----------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++ wget libzstd-dev libbz2-dev zlib1g-dev pkg-config libicu-dev gdb
        
        # Install Boost 1.89 manually
        cd /tmp
        wget https://github.com/boostorg/boost/releases/download/boost-1.89.0/boost-1.89.0-cmake.tar.gz
        tar xzf boost-1.89.0-cmake.tar.gz
        cd boost-1.89.0
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=OFF
        sudo cmake --build . --target install -j$(nproc)

    # ----------------------------
    # BUILD (Debug + Logging)
    # ----------------------------
    - name: Build
      run: |
        mkdir build
        cd build
        export CXXFLAGS="-Wall -Wextra -Wno-unused-parameter"
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DBoost_USE_STATIC_LIBS=ON
        cmake --build . --parallel 2>&1 | tee build_log.txt

    # ----------------------------
    # COPY SAMPLE FASTA FILES
    # ----------------------------
    - name: Copy sample FASTA files to build directory
      run: |
        cp test_data/1.fasta build/
        cp test_data/2.fasta build/

    # ----------------------------
    # RUN UNDER GDB FOR BACKTRACE
    # ----------------------------
    - name: Run progressiveMauve under gdb
      run: |
        cd build
        set +e
        gdb -q -batch -ex "run 1.fasta 2.fasta --output=seqs.xmfa" -ex "bt" ./progressiveMauve || true

    # ----------------------------
    # SAVE ARTIFACTS
    # ----------------------------
    - name: Stage Binaries
      run: |
        mkdir dist
        cp build/progressiveMauve dist/
        cp build/build_log.txt dist/
        # Optionally, copy output or logs
        [ -f build/bb.txt ] && cp build/bb.txt dist/
        [ -f build/seqs.xmfa ] && cp build/seqs.xmfa dist/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: debug-linux-artifacts
        path: dist/*
