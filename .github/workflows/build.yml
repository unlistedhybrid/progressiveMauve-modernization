name: Debug Linux Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ----------------------------
    # LINUX DEPENDENCIES
    # ----------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++ wget libzstd-dev libbz2-dev zlib1g-dev pkg-config libicu-dev
        
        # Boost 1.89
        cd /tmp
        wget https://github.com/boostorg/boost/releases/download/boost-1.89.0/boost-1.89.0-cmake.tar.gz
        tar xzf boost-1.89.0-cmake.tar.gz
        cd boost-1.89.0
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=OFF -DCMAKE_DISABLE_FIND_PACKAGE_ICU=ON
        sudo cmake --build . --target install -j$(nproc)

    # ----------------------------
    # BUILD WITH WARNINGS
    # ----------------------------
    - name: Build
      run: |
        mkdir build
        cd build
        # -Wall -Wextra turns on useful warnings
        # -Werror=int-to-pointer-cast fails the build if we break 64-bit pointers (Common Segfault cause)
        export CXXFLAGS="-Wall -Wextra -Wno-unused-parameter"
        
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DBoost_USE_STATIC_LIBS=ON
        
        # We pipe output to a log file AND stdout so we can read it later
        cmake --build . --parallel 2>&1 | tee build_log.txt

    # ----------------------------
    # UPLOAD LOGS & BINARY
    # ----------------------------
    - name: Upload Logs and Binary
      uses: actions/upload-artifact@v4
      with:
        name: debug-output-linux
        path: |
          build/build_log.txt
          build/progressiveMauve
          build/mauveAligner
