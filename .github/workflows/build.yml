name: Build ProgressiveMauve Multi-Platform

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows manual triggering button

jobs:
  # =========================================================
  # JOB 1: LINUX BUILD (GCC)
  # =========================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake wget

    - name: Cache Boost Source
      id: cache-boost-src
      uses: actions/cache@v3
      with:
        path: boost_1_57_0.tar.bz2
        key: boost-1.57-source

    - name: Download Boost 1.57
      if: steps.cache-boost-src.outputs.cache-hit != 'true'
      run: |
        wget -c https://sourceforge.net/projects/boost/files/boost/1.57.0/boost_1_57_0.tar.bz2

    - name: Build Boost (Linux)
      run: |
        tar --bzip2 -xf boost_1_57_0.tar.bz2
        cd boost_1_57_0
        ./bootstrap.sh --with-libraries=filesystem,iostreams,program_options,system,regex
        # -fPIC is crucial for static linking
        ./b2 -j$(nproc) link=static threading=multi cxxflags="-fPIC -std=c++14" install --prefix=$(pwd)/../boost_install_linux

    - name: Build ProgressiveMauve (Linux)
      run: |
        mkdir build_linux
        cd build_linux
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_ZLIB=OFF \
          -DENABLE_SANITIZERS=OFF \
          -DENABLE_CCACHE=OFF \
          -DBOOST_ROOT="../boost_install_linux" \
          -DBoost_NO_SYSTEM_PATHS=ON
        make -j$(nproc)
        # Rename for clarity
        mv progressiveMauve progressiveMauve_linux_x64

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: progressiveMauve_linux_x64
        path: build_linux/progressiveMauve_linux_x64

  # =========================================================
  # JOB 2: WINDOWS BUILD (Cross-Compile via MinGW on Linux)
  # =========================================================
  build-windows:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install MinGW-w64
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake wget mingw-w64 g++-mingw-w64

    - name: Cache Boost Source
      id: cache-boost-src
      uses: actions/cache@v3
      with:
        path: boost_1_57_0.tar.bz2
        key: boost-1.57-source

    - name: Download Boost 1.57
      if: steps.cache-boost-src.outputs.cache-hit != 'true'
      run: |
        wget -c https://sourceforge.net/projects/boost/files/boost/1.57.0/boost_1_57_0.tar.bz2

    - name: Build Boost (Windows/MinGW)
      run: |
        tar --bzip2 -xf boost_1_57_0.tar.bz2
        cd boost_1_57_0
        
        # Configure Boost to use the MinGW cross-compiler
        echo "using gcc : mingw : x86_64-w64-mingw32-g++ ;" > ~/user-config.jam
        
        ./bootstrap.sh --with-libraries=filesystem,iostreams,program_options,system,regex
        
        # Build for Windows target
        ./b2 -j$(nproc) toolset=gcc-mingw target-os=windows link=static threading=multi \
           cxxflags="-fPIC -std=c++14 -Wno-deprecated-register" \
           install --prefix=$(pwd)/../boost_install_win

    - name: Build ProgressiveMauve (Windows)
      run: |
        mkdir build_win
        cd build_win
        
        # Create Toolchain File for CMake
        echo "set(CMAKE_SYSTEM_NAME Windows)" > toolchain.cmake
        echo "set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)" >> toolchain.cmake
        echo "set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)" >> toolchain.cmake
        echo "set(CMAKE_RC_COMPILER x86_64-w64-mingw32-windres)" >> toolchain.cmake
        
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=toolchain.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_ZLIB=OFF \
          -DENABLE_SANITIZERS=OFF \
          -DENABLE_CCACHE=OFF \
          -DBOOST_ROOT="../boost_install_win" \
          -DBoost_NO_SYSTEM_PATHS=ON
          
        make -j$(nproc)
        # Rename for clarity
        mv progressiveMauve.exe progressiveMauve_windows_x64.exe

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: progressiveMauve_windows_x64
        path: build_win/progressiveMauve_windows_x64.exe

  # =========================================================
  # JOB 3: macOS ARM64 (Native M1/M2 Build)
  # =========================================================
  build-macos:
    runs-on: macos-14 # Native Apple Silicon Runner
    steps:
    - uses: actions/checkout@v4

    - name: Install Tools
      run: brew install cmake wget

    - name: Download Boost 1.57
      run: |
        curl -L -o boost_1_57_0.tar.bz2 https://sourceforge.net/projects/boost/files/boost/1.57.0/boost_1_57_0.tar.bz2
        tar -xjf boost_1_57_0.tar.bz2

    - name: Build Boost (macOS)
      run: |
        cd boost_1_57_0
        ./bootstrap.sh --with-libraries=filesystem,iostreams,program_options,system,regex
        # Build using Clang (default on Mac)
        ./b2 -j$(sysctl -n hw.ncpu) link=static threading=multi cxxflags="-std=c++14 -fPIC" install --prefix=$(pwd)/../boost_install_mac

    - name: Build ProgressiveMauve (macOS)
      run: |
        mkdir build_mac
        cd build_mac
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_ZLIB=OFF \
          -DENABLE_SANITIZERS=OFF \
          -DENABLE_CCACHE=OFF \
          -DBOOST_ROOT="../boost_install_mac" \
          -DBoost_NO_SYSTEM_PATHS=ON
          
        make -j$(sysctl -n hw.ncpu)
        # Rename for clarity
        mv progressiveMauve progressiveMauve_macos_arm64

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: progressiveMauve_macos_arm64
        path: build_mac/progressiveMauve_macos_arm64