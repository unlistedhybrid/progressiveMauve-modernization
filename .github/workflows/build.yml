name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    # ----------------------------
    # LINUX
    # ----------------------------
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y cmake g++ wget
        cd /tmp
        wget https://github.com/boostorg/boost/releases/download/boost-1.89.0/boost-1.89.0-cmake.tar.gz
        tar xzf boost-1.89.0-cmake.tar.gz
        cd boost-1.89.0
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON
        sudo cmake --build . --target install -j$(nproc)

    # ----------------------------
    # MACOS
    # ----------------------------
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install boost@1.89 cmake
        brew link boost@1.89 --force

    # ----------------------------
    # WINDOWS
    # ----------------------------
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install cmake -y

        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.bat

        # Install Boost modules
        # Added boost-pool, boost-tuple, boost-math to fix the new errors
        ./vcpkg install boost-filesystem:x64-windows boost-iostreams:x64-windows boost-program-options:x64-windows boost-regex:x64-windows boost-algorithm:x64-windows boost-multi-array:x64-windows boost-tokenizer:x64-windows boost-format:x64-windows boost-random:x64-windows boost-pool:x64-windows boost-tuple:x64-windows boost-math:x64-windows

        # Correct way to export environment variables on Windows GitHub runners
        Add-Content $env:GITHUB_ENV "CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake"

    # ----------------------------
    # BUILD (LINUX & MACOS)
    # ----------------------------
    - name: Build (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel

    # ----------------------------
    # BUILD (WINDOWS)
    # ----------------------------
    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}"
        cmake --build . --config Release --parallel
